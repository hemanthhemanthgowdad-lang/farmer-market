<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<title>Customer Dashboard</title>

<style>

body{
    margin:0;
    font-family:Arial;

    background:
    linear-gradient(rgba(0,0,100,0.6),
    rgba(0,0,100,0.6)),
    url('https://images.unsplash.com/photo-1500937386664-56d1dfef3854');

    background-size:cover;
    background-position:center;
}

/* NAVBAR */

.navbar{
    background:black;
    padding:20px;
    text-align:center;
    box-shadow:0px 0px 10px black;
}

.navbar a{
    color:white;
    text-decoration:none;
    margin:20px;
    font-size:20px;
    font-weight:bold;
}

.navbar a:hover{
    color:yellow;
    transition:0.3s;
}

/* TITLE */

.title{
    text-align:center;
    color:white;
    font-size:50px;
    margin-top:30px;
    text-shadow:2px 2px 5px black;
}

/* CARDS */

.container{
    text-align:center;
    margin-top:50px;
}

.card{
    width:280px;
    display:inline-block;
    margin:25px;
    padding:30px;
    background:rgba(255,255,255,0.2);
    backdrop-filter:blur(10px);
    border-radius:20px;
    color:white;
    box-shadow:0px 0px 15px black;
}

.card img{
    width:100%;
    height:180px;
    border-radius:15px;
}

/* BUTTON */

.btn{
    display:inline-block;
    margin-top:20px;
    padding:12px 25px;
    background:blue;
    color:white;
    text-decoration:none;
    border-radius:10px;
    font-size:18px;
}

.btn:hover{
    background:darkblue;
    transform:scale(1.05);
    transition:0.3s;
}

/* FLOATING CHAT */

.live-chat{
    position:fixed;
    bottom:30px;
    right:30px;
    background:green;
    color:white;
    padding:15px 25px;
    border-radius:50px;
    text-decoration:none;
    font-size:22px;
    font-weight:bold;
    box-shadow:0px 0px 10px black;
    z-index:999;
}

.live-chat:hover{
    background:darkgreen;
}

</style>

</head>

<body>
<div id="google_translate_element"></div>
<!-- NAVBAR -->

<div class="navbar">

<a href="/customer">Home</a>

<a href="/view">View Products</a>

<a href="/track">Track Orders</a>

<a href="/logout">Logout</a>

</div>

<!-- TITLE -->

<h1 class="title">
🛒 Customer Dashboard 🛒
</h1>

<!-- CARDS -->

<div class="container">

<div class="card">

<img src="https://images.unsplash.com/photo-1542838132-92c53300491e">

<h2>View Products</h2>

<p>Explore fresh crops and vegetables.</p>

<a class="btn" href="/view">
Open
</a>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1518770660439-4636190af475">

<h2>Track Orders</h2>

<p>Check your crop delivery status.</p>

<a class="btn" href="/track">
Open
</a>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1523741543316-beb7fc7023d8">

<h2>Farmers List</h2>

<p>View crops with farmer names and contact.</p>

<a class="btn" href="/view?role=customer">
Shop Now
</a>

</div>

</div>

<!-- FLOATING LIVE CHAT -->

<a href="/chat" class="live-chat">
💬 Live Chat
</a>
<script type="text/javascript">

function googleTranslateElementInit() {

new google.translate.TranslateElement(

{
pageLanguage: 'en',
includedLanguages: 'en,ta,hi,kn,te,ml',
layout: google.translate.TranslateElement.InlineLayout.SIMPLE

},

'google_translate_element'

);

}

</script>

<script type="text/javascript"
src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit">
</script>
</body>

</html>
