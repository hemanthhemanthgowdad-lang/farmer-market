<!DOCTYPE html>
<html>

<head>

<title>Farmer Registration</title>

<style>

body{
    margin:0;
    padding:0;
    font-family:Arial;

    background:
    linear-gradient(rgba(0,100,0,0.7),
    rgba(0,100,0,0.7)),
    url('https://images.unsplash.com/photo-1500937386664-56d1dfef3854');

    background-size:cover;
    background-position:center;
    height:100vh;
}

.box{

    width:400px;

    padding:40px;

    background:rgba(255,255,255,0.2);

    backdrop-filter:blur(10px);

    border-radius:20px;

    position:absolute;

    top:50%;

    left:50%;

    transform:translate(-50%,-50%);

    text-align:center;

    box-shadow:0px 0px 20px black;

    color:white;

}

h1{

    margin-bottom:30px;

}

input{

    width:90%;

    height:45px;

    margin:12px;

    border:none;

    border-radius:10px;

    padding-left:10px;

    font-size:16px;

}

button{

    width:95%;

    height:45px;

    background:limegreen;

    color:white;

    border:none;

    border-radius:10px;

    font-size:18px;

    cursor:pointer;

}

button:hover{

    background:green;

    transform:scale(1.03);

    transition:0.3s;

}

</style>

</head>

<body>
<div id="google_translate_element"></div>
<div class="box">

<h1>🌾 Farmer Registration 🌾</h1>

<form method="POST">

<input type="text"
name="name"
placeholder="Enter Name"
required>

<input type="email"
name="email"
placeholder="Enter Email"
required>

<input type="password"
name="password"
placeholder="Enter Password"
required>

<button type="submit">
Register
</button>

</form>

</div>
<script type="text/javascript">

function googleTranslateElementInit() {

new google.translate.TranslateElement(

{
pageLanguage: 'en',
includedLanguages: 'en,ta,hi,kn,te,ml',
layout: google.translate.TranslateElement.InlineLayout.SIMPLE

},

'google_translate_element'

);

}

</script>

<script type="text/javascript"
src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit">
</script>
</body>

</html>
