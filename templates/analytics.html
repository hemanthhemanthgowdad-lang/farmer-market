<!DOCTYPE html>
<html>

<head>

<title>Admin Analytics</title>

<style>

body{

    margin:0;
    padding:0;
    font-family:Arial;
    background:linear-gradient(to right,#56ab2f,#a8e063);

}

.title{

    text-align:center;
    color:white;
    font-size:50px;
    margin-top:30px;

}

.container{

    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    margin-top:50px;

}

.card{

    width:260px;
    background:white;
    margin:20px;
    padding:30px;
    border-radius:20px;
    text-align:center;
    box-shadow:0px 0px 20px black;

}

.card h2{

    color:green;
    font-size:35px;

}

.card p{

    font-size:45px;
    font-weight:bold;
    color:black;

}

.btn{

    display:block;
    width:180px;
    margin:40px auto;
    text-align:center;
    padding:15px;
    background:green;
    color:white;
    text-decoration:none;
    border-radius:10px;
    font-size:22px;

}

</style>

</head>

<body>
<div id="google_translate_element"></div>
<h1 class="title">

📊 Admin Analytics Dashboard

</h1>

<div class="container">

<div class="card">

<h2>Total Crops</h2>

<p>{{ total_crops }}</p>

</div>

<div class="card">

<h2>Total Orders</h2>

<p>{{ total_orders }}</p>

</div>

<div class="card">

<h2>Total Farmers</h2>

<p>{{ total_farmers }}</p>

</div>

<div class="card">

<h2>Total Revenue</h2>

<p>₹ {{ revenue }}</p>

</div>

</div>

<a href="/dashboard" class="btn">

Back

</a>
<script type="text/javascript">

function googleTranslateElementInit() {

new google.translate.TranslateElement(

{
pageLanguage: 'en',
includedLanguages: 'en,ta,hi,kn,te,ml',
layout: google.translate.TranslateElement.InlineLayout.SIMPLE

},

'google_translate_element'

);

}

</script>

<script type="text/javascript"
src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit">
</script>
</body>

</html>
