<!DOCTYPE html>
<html>

<head>

<title>Track Order</title>

<style>

body{
    font-family:Arial;
    background:#f1f1f1;
}

.box{
    width:400px;
    margin:auto;
    margin-top:100px;
    background:white;
    padding:30px;
    text-align:center;
    border-radius:10px;
}

input{
    width:90%;
    height:40px;
    margin:10px;
    padding-left:10px;
}

button{
    background:green;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:5px;
}

</style>

</head>

<body>
<div id="google_translate_element"></div>
<div class="box">

<h1>Track Order</h1>

<form method="POST">

<input type="text"
name="phone"
placeholder="Enter Phone Number"
required>

<button type="submit">
Track
</button>

</form>

{% if orders %}

<h2>Your Orders</h2>

{% for order in orders %}

<p>
<b>{{ order[1] }}</b>
-
{{ order[4] }}
</p>

{% endfor %}

{% endif %}

</div>
<script type="text/javascript">

function googleTranslateElementInit() {

new google.translate.TranslateElement(

{
pageLanguage: 'en',
includedLanguages: 'en,ta,hi,kn,te,ml',
layout: google.translate.TranslateElement.InlineLayout.SIMPLE

},

'google_translate_element'

);

}

</script>

<script type="text/javascript"
src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit">
</script>
</body>

</html>
