<!DOCTYPE html>
<html>
<head>
    <title>Update Crop</title>
</head>
<body>
<div id="google_translate_element"></div>
<h1>Update Crop</h1>

<form method="POST">

    <label>Crop Name:</label><br>
    <input type="text" name="crop_name" value="{{ crop[1] }}"><br><br>

    <label>Quantity:</label><br>
    <input type="text" name="quantity" value="{{ crop[2] }}"><br><br>

    <label>Price:</label><br>
    <input type="text" name="price" value="{{ crop[3] }}"><br><br>

    <button type="submit">Update Crop</button>

</form>
<script type="text/javascript">

function googleTranslateElementInit() {

new google.translate.TranslateElement(

{
pageLanguage: 'en',
includedLanguages: 'en,ta,hi,kn,te,ml',
layout: google.translate.TranslateElement.InlineLayout.SIMPLE

},

'google_translate_element'

);

}

</script>

<script type="text/javascript"
src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit">
</script>
</body>
</html>
