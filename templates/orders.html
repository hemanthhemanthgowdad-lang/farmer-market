<!DOCTYPE html>
<html>

<head>

<title>All Orders</title>

<style>

body{
    font-family:Arial;
    background:#f1f1f1;
}

h1{
    text-align:center;
    color:green;
}

table{
    width:90%;
    margin:auto;
    border-collapse:collapse;
    background:white;
}

th{
    background:green;
    color:white;
    padding:15px;
}

td{
    padding:12px;
    text-align:center;
    border-bottom:1px solid #ddd;
}

</style>

</head>

<body>
<div id="google_translate_element"></div>
<h1>All Orders</h1>

<table>

<tr>

<th>ID</th>
<th>Crop Name</th>
<th>Customer Name</th>
<th>Phone</th>
<th>Location</th>
<th>Quantity</th>
<th>Payment Method</th>
<th>Status</th>
<th>Action</th>

</tr>

{% for order in orders %}
<tr>

<td>{{ order[0] }}</td>

<td>{{ order[1] }}</td>

<td>{{ order[2] }}</td>

<td>{{ order[3] }}</td>

<td>{{ order[7] }}</td> <!-- Location -->

<td>{{ order[6] }}</td> <!-- Quantity -->

<td>{{ order[5] }}</td> <!-- Payment -->

<td>{{ order[4] }}</td> <!-- Status -->

<td>

<a href="/accept/{{ order[0] }}"
style="background:green;color:white;padding:8px 15px;text-decoration:none;border-radius:5px;">

Accept

</a>

</td>

</tr>

{% endfor %}

</table>
<script type="text/javascript">

function googleTranslateElementInit() {

new google.translate.TranslateElement(

{
pageLanguage: 'en',
includedLanguages: 'en,ta,hi,kn,te,ml',
layout: google.translate.TranslateElement.InlineLayout.SIMPLE

},

'google_translate_element'

);

}

</script>

<script type="text/javascript"
src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit">
</script>
</body>

</html>
