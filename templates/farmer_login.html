<!DOCTYPE html>
<html>
<head>

    <title>Farmer Login</title>

    <style>

        body{

            font-family: Arial;

            background:green;

            display:flex;

            justify-content:center;

            align-items:center;

            height:100vh;
        }

        .box{

            background:white;

            padding:40px;

            border-radius:10px;

            width:350px;

            text-align:center;
        }

        input{

            width:90%;

            height:40px;

            margin:10px;

            padding-left:10px;
        }

        button{

            background:green;

            color:white;

            border:none;

            padding:12px 20px;

            border-radius:5px;
        }

    </style>

</head>

<body>
<div id="google_translate_element"></div>
    <div class="box">

        <h1>🌾 Farmer Login</h1>

        <form method="POST">

            <input type="email"
            name="email"
            placeholder="Enter Email">

            <input type="password"
            name="password"
            placeholder="Enter Password">

            <br><br>

            <button type="submit">
                Login
            </button>

        </form>

    </div>
<script type="text/javascript">

function googleTranslateElementInit() {

new google.translate.TranslateElement(

{
pageLanguage: 'en',
includedLanguages: 'en,ta,hi,kn,te,ml',
layout: google.translate.TranslateElement.InlineLayout.SIMPLE

},

'google_translate_element'

);

}

</script>

<script type="text/javascript"
src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit">
</script>
</body>
</html>
